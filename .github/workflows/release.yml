name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        required: true
        type: boolean
        default: true
      version:
        description: "Release version"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ssh-signin
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        name: Checkout
        with:
          persist-credentials: true
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.0.1
        name: Set up NodeJS
        with:
          node-version: 24
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        name: Set up PNPM
        with:
          version: 10.33.0
      - name: Install
        run: pnpm install
      - name: Test
        run: pnpm test
      - uses: photostructure/git-ssh-signing-action@eb48d0517cdf304a5fde87d539702a74ebc01e09 # v2.0.0
        name: Setup git sign
        with:
          ssh-signing-key: ${{ secrets.SSH_SIGNING_KEY }}
          git-user-name: ${{ secrets.GIT_USER_NAME }}
          git-user-email: ${{ secrets.GIT_USER_EMAIL }}
      - name: Release
        run: pnpm run release:${{ inputs.version }}
      - name: git verify-commit
        run: |
          git verify-commit HEAD^1
          git verify-commit HEAD
      - name: git log
        run: |
          git log -n5 --oneline
          git tag --sort=-creatordate
      - name: git push (dry-run)
        run: git push --dry-run origin master
      - name: git push
        if: inputs.dry_run == false
        run: |
          git push origin ${{ github.ref_name }} 
          git push --tags
