name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (vX.Y.Z)"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        name: Checkout
        with:
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.0.1
        name: Set up NodeJS
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        name: Set up PNPM
        with:
          version: 10.33.0
      - name: Fetch all tags
        run: |
          git fetch --prune --unshallow --tags
          git tag --list --sort=committerdate
      - name: Checkout tag
        run: git checkout "${VERSION}"
        env:
          VERSION: ${{ inputs.version }}
      - name: pnpm install
        run: pnpm install
      - name: Publish (test)
        run: NODE_AUTH_TOKEN="" pnpm publish --dry-run --no-git-checks
      - name: Publish
        if: inputs.dry_run == false
        run: NODE_AUTH_TOKEN="" pnpm publish --no-git-checks --provenance
